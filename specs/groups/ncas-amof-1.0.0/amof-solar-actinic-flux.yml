var-requires0:
  func: checksit.generic.check_var
  params:
    variable:
      - solar_actinic_flux:__OPTIONAL__
    defined_attrs:
      - type:float
      - dimension:time
      - units:cm-2 s-1 nm-1
      - long_name:Solar Actinic Flux
      - _FillValue:-1e+20
      - valid_min:<derived from file>
      - valid_max:<derived from file>
      - cell_methods:time: ????
      - coordinates:latitude longitude
var-requires1:
  func: checksit.generic.check_var
  params:
    variable:
      - photolysis_frquencies:__OPTIONAL__
    defined_attrs:
      - type:float
      - dimension:time
      - units:s-1
      - long_name:Photolysis Frquencies (j(NO2))
      - _FillValue:-1e+20
      - valid_min:<derived from file>
      - valid_max:<derived from file>
      - cell_methods:time: ????
      - coordinates:latitude longitude
var-requires2:
  func: checksit.generic.check_var
  params:
    variable:
      - qc_flag:__OPTIONAL__
    defined_attrs:
      - type:byte
      - dimension:time
      - units:1
      - long_name:Data Quality flag
      - flag_values:0b,1b, 2b, 3b
      - flag_meanings:not_used good_data suspect_data_unspecified_instrument_performance_issues_contact_data_originator_for_more_information suspect_data_time_stamp_error
